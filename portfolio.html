<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yash — Portfolio</title>
<script type="importmap">
{
  "imports": {
    "@splinetool/runtime": "https://unpkg.com/@splinetool/runtime@1.9.48/build/runtime.js"
  }
}
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
  main {
    min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center;
    padding: 1rem; background: #000;
  }
  .card {
    width: 100%; max-width: 72rem; height: 600px;
    background: rgba(0,0,0,0.96); border: 1px solid #262626; border-radius: 12px;
    position: relative; overflow: hidden; display: flex; flex-direction: column;
  }
  @media (min-width: 768px) { .card { flex-direction: row; } .card-inner { flex-direction: row; } }
  .card-inner { display: flex; flex-direction: column; height: 100%; width: 100%; }
  @media (min-width: 768px) { .card-inner { flex-direction: row; } }
  .left {
    flex: 1; padding: 2rem; display: flex; flex-direction: column; justify-content: center;
    position: relative; z-index: 10;
  }
  @media (min-width: 768px) { .left { padding: 3rem; } }
  h1 {
    font-size: clamp(2.25rem, 5vw, 3.75rem); font-weight: 800; line-height: 1.1;
    background: linear-gradient(to bottom, #fafafa, #a3a3a3);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p { margin-top: 1.5rem; color: #d4d4d4; max-width: 32rem; font-size: 1rem; line-height: 1.6; }
  @media (min-width: 768px) { p { font-size: 1.125rem; } }
  .right { flex: 1; position: relative; min-height: 300px; }
  canvas { width: 100% !important; height: 100% !important; display: block; }

  .spotlight {
    position: absolute; top: -10rem; left: 0; pointer-events: none; z-index: 1;
    height: 169%; width: 138%; opacity: 0;
    animation: spotlight 2s ease 0.75s 1 forwards;
  }
  @media (min-width: 1024px) { .spotlight { width: 84%; left: 15rem; top: -5rem; } }
  @keyframes spotlight {
    0% { opacity: 0; transform: translate(-72%, -62%) scale(0.5); }
    100% { opacity: 1; transform: translate(-50%, -40%) scale(1); }
  }

  .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #a3a3a3; font-size: 0.875rem; }
</style>
</head>
<body>
<main>
  <div class="card">
    <svg class="spotlight" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3787 2842" fill="none">
      <g filter="url(#filter)">
        <ellipse cx="1924.71" cy="273.501" rx="1924.71" ry="273.501"
          transform="matrix(-0.822377 -0.568943 -0.568943 0.822377 3631.88 2291.09)"
          fill="white" fill-opacity="0.21" />
      </g>
      <defs>
        <filter id="filter" x="0.86" y="0.84" width="3785.16" height="2840.26" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
          <feFlood flood-opacity="0" result="BackgroundImageFix"/>
          <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
          <feGaussianBlur stdDeviation="151" result="effect1_foregroundBlur_1065_8"/>
        </filter>
      </defs>
    </svg>

    <div class="card-inner">
      <div class="left">
        <h1>Hello, I am Yash</h1>
        <p>Welcome to my portfolio. I craft interactive experiences and bring ideas to life with thoughtful design and a touch of 3D.</p>
      </div>
      <div class="right">
        <div class="loading" id="loading">Loading 3D scene…</div>
        <canvas id="canvas3d"></canvas>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import { Application } from '@splinetool/runtime';
  const canvas = document.getElementById('canvas3d');
  const app = new Application(canvas);
  app.load('https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode')
    .then(() => { document.getElementById('loading').style.display = 'none'; })
    .catch((e) => { document.getElementById('loading').textContent = 'Failed to load scene'; console.error(e); });
</script>
</body>
</html>
